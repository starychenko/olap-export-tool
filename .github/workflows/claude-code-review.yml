name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          custom_instructions: |
            Цей проект — OLAP Export Tool (Python CLI). При рев'ю зверни особливу увагу на:

            АРХІТЕКТУРНІ ІНВАРІАНТИ (критично):
            - os.getenv() дозволено тільки у config.py (load_*_from_env) та security.py.
              Всі модулі отримують конфіг через AppConfig dataclass.
            - AnalyticsSink ABC (sinks.py): всі сховища реалізують setup/delete_period/insert/close.
            - Ідемпотентність: DELETE WHERE year_num=X AND week_num=Y перед кожним INSERT.
            - З'єднання завжди закриваються у finally блоках.
            - sanitize_df — shared утиліта у sinks.py (не дублювати).

            СТИЛЬ:
            - User-facing повідомлення — українською мовою.
            - Використовувати print_error/print_warning/print_success/print_progress з utils.py.
            - Type hints у сигнатурах функцій.
            - Відносні імпорти всередині пакету olap_tool.

            НА ЩО ЗВЕРТАТИ УВАГУ:
            - Незакриті ресурси/з'єднання
            - Англомовні user-facing повідомлення
            - SQL injection через f-string без екранування
            - Неправильний type mapping pandas → CH/DuckDB типів
            - Batch INSERT без чанкування (може вичерпати пам'ять при великих DataFrame)
            - Thread safety у паралельних скриптах

            ЩО НЕ Є ПРОБЛЕМОЮ:
            - Відсутність unit-тестів (проект не має тестової інфраструктури)
            - Довгі функції якщо логіка монолітна за природою
            - Ukrainian comments у коді

            Відповідай українською мовою.
